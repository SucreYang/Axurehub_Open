        const Sparkles = (props) => <IconWrapper {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/></IconWrapper>;

        const BarChart3 = (props) => <IconWrapper {...props}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></IconWrapper>;

        // --- Data ---
        const CATEGORIES = [
            {
                id: 'ip',
                title: '一、知识产权',
                icon: Lightbulb,
                maxScore: 30,
                description: '重点考查数量、质量、对产品的支撑作用及获取方式。',
                questions: [
                    {
                        id: 'ip_tech',
                        text: '技术的先进程度',
                        subText: '评价核心技术是否属于行业前沿。',
                        tips: '【高分秘籍】除专利证书外，建议提供权威机构出具的《科技查新报告》、科技成果鉴定证书或国家/行业标准参编证明，以佐证技术的“先进性”。',
                        maxScore: 8,
                        options: [
                            { label: '高 (7-8分)', minScore: 7, maxScore: 8, description: '世界领先或国内领先，具有极高门槛。' },
                            { label: '中 (4-6分)', minScore: 4, maxScore: 6, description: '国内先进，行业主流技术。' },
                            { label: '低 (1-3分)', minScore: 1, maxScore: 3, description: '行业通用技术，无明显优势。' },
                            { label: '无 (0分)', minScore: 0, maxScore: 0, description: '技术落后或无技术。' }
                        ]
                    },
                    {
                        id: 'ip_support',
                        text: '对主要产品（服务）在技术上的支撑作用',
                        subText: '知识产权是否应用在企业的核心收入产品上。',
                        tips: '【高分秘籍】专家重点看“关联度”。准备材料时，务必将专利名称与产品销售合同、技术服务合同中的产品名称建立明确的对应关系表。',
                        maxScore: 8,
                        options: [
                            { label: '强 (7-8分)', minScore: 7, maxScore: 8, description: '核心产品完全依赖该专利技术。' },
                            { label: '中 (4-6分)', minScore: 4, maxScore: 6, description: '部分产品应用，或起到辅助作用。' },
                            { label: '弱 (1-3分)', minScore: 1, maxScore: 3, description: '应用较少，或仅边缘产品应用。' },
                            { label: '无 (0分)', minScore: 0, maxScore: 0, description: '未应用。' }
                        ]
                    },
                    {
                        id: 'ip_qty',
                        text: '知识产权数量',
                        subText: 'I类（发明专利等）与II类（实用新型、软著等）的综合评价。',
                        tips: '【高分秘籍】1项I类（发明专利）即可拿高分。若仅有II类（软著/实用新型），建议准备6项以上以确保拿满6分档（虽然标准写5项，多准备1项作为保险）。',
                        maxScore: 8,
                        options: [
                            { label: '1项及以上I类 (7-8分)', minScore: 7, maxScore: 8, description: '拥有至少1项发明专利、植物新品种等。' },
                            { label: '5项及以上II类 (5-6分)', minScore: 5, maxScore: 6, description: '无I类，但实用新型/软著数量丰富。' },
                            { label: '3-4项II类 (3-4分)', minScore: 3, maxScore: 4, description: '数量一般。' },
                            { label: '1-2项II类 (1-2分)', minScore: 1, maxScore: 2, description: '数量较少。' },
                            { label: '0项 (0分)', minScore: 0, maxScore: 0, description: '无知识产权。' }
                        ]
                    },
                    {
                        id: 'ip_method',
                        text: '知识产权获得方式',
                        subText: '自主研发的含金量高于受让或受赠。',
                        tips: '【评分要点】完全自主研发（申请人一直是本公司）得满分。如果是通过购买、转让获得的专利，专家通常会酌情扣除3-4分。',
                        maxScore: 6,
                        options: [
                            { label: '自主研发 (1-6分)', minScore: 1, maxScore: 6, description: '企业独立研发申请，得分最高。' },
                            { label: '受让、受赠、并购 (1-3分)', minScore: 1, maxScore: 3, description: '通过购买或转移获得。' }
                        ]
                    }
                ]
            },
            {
                id: 'transformation',
                title: '二、科技成果转化能力',
                icon: RotateCcw,
                maxScore: 30,
                description: '考查近3年内科技成果转化为产品、服务、样品、样机的年平均数。',
                questions: [
                    {
                        id: 'trans_avg',
                        text: '近3年年均转化数',
                        subText: '计算公式：(近3年转化总数 ÷ 3)。',
                        tips: '【核心规则】1. 一个成果转为多个产品，算1项转化；2. 多个成果转为1个产品，算多项转化！\n【拿分建议】尽量挖掘“多对一”的情况。证明材料不仅要销售合同，建议补充检测报告、查新报告、用户验收报告等作为佐证链。',
                        maxScore: 30,
                        options: [
                            { label: 'A档：年均 ≥ 5项 (25-30分)', minScore: 25, maxScore: 30, description: '3年总数 ≥ 15项，转化能力极强。' },
                            { label: 'B档：年均 ≥ 4项 (19-24分)', minScore: 19, maxScore: 24, description: '3年总数 12-14项，转化能力较强。' },
                            { label: 'C档：年均 ≥ 3项 (13-18分)', minScore: 13, maxScore: 18, description: '3年总数 9-11项，转化能力一般。' },
                            { label: 'D档：年均 ≥ 2项 (7-12分)', minScore: 7, maxScore: 12, description: '3年总数 6-8项，转化能力较弱。' },
                            { label: 'E档：年均 < 2项 (0-6分)', minScore: 0, maxScore: 6, description: '3年总数 < 6项，建议补足。' }
                        ]
                    }
                ]
            },
            {
                id: 'management',
                title: '三、研究开发组织管理水平',
                icon: Users,
                maxScore: 20,
                description: '考查企业研发体系的规范化程度。',
                questions: [
                    {
                        id: 'mgmt_system',
                        text: '研发组织管理制度',
                        subText: '是否有立项报告、研发投入核算体系、研发辅助账。',
                        tips: '【一票否决项】必须建立《研发费用辅助账》！如果没有规范的财务核算，此项很难得分。建议提供立项决议、结题验收报告及财务管理制度文件。',
                        maxScore: 6,
                        options: [
                            { label: '制度健全 (5-6分)', minScore: 5, maxScore: 6, description: '立项规范，有专账/辅助账，核算清晰。' },
                            { label: '制度基本健全 (3-4分)', minScore: 3, maxScore: 4, description: '有制度但执行不够严格，核算基本合规。' },
                            { label: '制度不健全 (0-2分)', minScore: 0, maxScore: 2, description: '缺乏规范的立项和财务核算。' }
                        ]
                    },
                    {
                        id: 'mgmt_collab',
                        text: '产学研合作及设施',
                        subText: '与高校院所的合作协议、共建研发机构、研发设备情况。',
                        tips: '【避坑指南】仅有一纸“战略合作协议”通常只能得基本分。要想拿高分，必须有：具体的委托开发合同 + 支付给高校的转账凭证（发票）。',
                        maxScore: 6,
                        options: [
                            { label: '有深度合作 (5-6分)', minScore: 5, maxScore: 6, description: '有正式协议、实质项目且设备先进。' },
                            { label: '有一般合作 (3-4分)', minScore: 3, maxScore: 4, description: '有协议但项目较少，设备一般。' },
                            { label: '无合作 (0-2分)', minScore: 0, maxScore: 2, description: '完全独立研发，无外部资源引入。' }
                        ]
                    },
                    {
                        id: 'mgmt_perf',
                        text: '成果转化奖励制度',
                        subText: '建立了科技成果转化与绩效挂钩的奖励机制。',
                        tips: '【证据链】除了《绩效考核制度》文件外，专家会查看工资发放表或奖金签收单，确认是否有针对研发人员的“专项奖励”落地。',
                        maxScore: 4,
                        options: [
                            { label: '机制完善 (3-4分)', minScore: 3, maxScore: 4, description: '有明确文件，且有实际奖励记录。' },
                            { label: '机制一般 (1-2分)', minScore: 1, maxScore: 2, description: '有文件但执行很少。' },
                            { label: '无 (0分)', minScore: 0, maxScore: 0, description: '无相关激励机制。' }
                        ]
                    },
                    {
                        id: 'mgmt_training',
                        text: '人才培养机制',
                        subText: '研发人员培训、引进、人才储备情况。',
                        tips: '【拿分建议】保留好年度培训计划、培训签到表、培训照片以及引进高端人才的猎头合同或录用通知书。',
                        maxScore: 4,
                        options: [
                            { label: '机制完善 (3-4分)', minScore: 3, maxScore: 4, description: '定期培训，有优秀人才引进计划。' },
                            { label: '机制一般 (1-2分)', minScore: 1, maxScore: 2, description: '偶尔培训。' },
                            { label: '无 (0分)', minScore: 0, maxScore: 0, description: '无培训计划。' }
                        ]
                    }
                ]
            },
            {
                id: 'growth',
                title: '四、企业成长性',
                icon: TrendingUp,
                maxScore: 20,
                description: '根据近三年的财务数据计算。',
                questions: [
                    {
                        id: 'growth_sales',
                        text: '销售收入增长率',
                        subText: '反映市场占有率扩张情况。',
                        tips: '【提示】这是客观计算分。如果数据已定则无法更改。如果还在财务年度内，可合理确认收入节点。增长率 = 0.5×(第二年/第一年 -1) + 0.5×(第三年/第二年 -1)。',
                        maxScore: 10,
                        options: [
                            { label: '增长率 ≥ 35% (9-10分)', minScore: 9, maxScore: 10, description: '高速增长。' },
                            { label: '25% ≤ 增长率 < 35% (7-8分)', minScore: 7, maxScore: 8, description: '快速增长。' },
                            { label: '15% ≤ 增长率 < 25% (5-6分)', minScore: 5, maxScore: 6, description: '中速增长。' },
                            { label: '5% ≤ 增长率 < 15% (3-4分)', minScore: 3, maxScore: 4, description: '低速增长。' },
                            { label: '增长率 < 5% (0-2分)', minScore: 0, maxScore: 2, description: '微增长或负增长。' }
                        ]
                    },
                    {
                        id: 'growth_assets',
                        text: '净资产增长率',
                        subText: '反映企业资产保值增值情况。',
                        tips: '【提示】净资产 = 资产总额 - 负债总额。对于初创企业，净资产可能因投入大而为负，这会严重影响得分。注意：第一年净资产为0或负数的，按0分计算。',
                        maxScore: 10,
                        options: [
                            { label: '增长率 ≥ 35% (9-10分)', minScore: 9, maxScore: 10, description: '资产积累极快。' },
                            { label: '25% ≤ 增长率 < 35% (7-8分)', minScore: 7, maxScore: 8, description: '资产积累较快。' },
                            { label: '15% ≤ 增长率 < 25% (5-6分)', minScore: 5, maxScore: 6, description: '资产积累平稳。' },
                            { label: '5% ≤ 增长率 < 15% (3-4分)', minScore: 3, maxScore: 4, description: '资产积累较慢。' },
                            { label: '增长率 < 5% (0-2分)', minScore: 0, maxScore: 2, description: '资产未增长或减值。' }
                        ]
                    }
                ]
            }
        ];

        // --- Logic: Local Analysis ---
        const generateAnalysis = (scores, answers) => {
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const ipScore = scores['ip'] || 0;
            const transScore = scores['transformation'] || 0;
            const mgmtScore = scores['management'] || 0;
            const growthScore = scores['growth'] || 0;

            let summary = "";
            let strengths = [];
            let weaknesses = [];
            let advice = [];

            // 总评
            if (totalScore >= 80) {
                summary = `恭喜！您的预估总分为 ${totalScore} 分。这是一个非常有竞争力的分数，只要材料组织规范，通过认定的概率极高。`;
            } else if (totalScore >= 71) {
                summary = `您的预估总分为 ${totalScore} 分。处于达标线（70分）之上，但安全边际较小（建议75分以上较为稳妥）。需要重点补强弱项，防止专家扣分导致落榜。`;
            } else {
                summary = `您的预估总分为 ${totalScore} 分，低于70分的达标线。目前状态申请风险极大，建议进行针对性提升后再申报。`;
            }

            // 1. IP 分析
            if (ipScore >= 24) {
                strengths.push("知识产权储备丰富，核心技术含金量高。");
            } else if (ipScore < 18) {
                weaknesses.push(`知识产权得分偏低 (${ipScore}/30)。`);
                if ((answers['ip_qty'] || 0) < 5) advice.push("尽快挖掘申请实用新型专利或软著，确保I类+II类数量达标（建议15项以上II类或1项I类）。");
                if ((answers['ip_tech'] || 0) < 5) advice.push("梳理核心技术的先进性描述，提炼技术亮点。");
            }

            // 2. 转化分析
            if (transScore >= 25) {
                strengths.push("科技成果转化能力强，产品落地速度快。");
            } else {
                weaknesses.push(`成果转化数量不足 (${transScore}/30)。`);
                advice.push("梳理近三年的研发项目、检测报告、销售合同，尽可能挖掘‘技术->产品’的对应关系，确保年均转化数达到5项以上。");
            }

            // 3. 管理分析
            if (mgmtScore >= 16) {
                strengths.push("研发组织管理体系健全，制度规范。");
            } else {
                weaknesses.push(`研发管理体系存在漏洞 (${mgmtScore}/20)。`);
                if ((answers['mgmt_system'] || 0) < 4) advice.push("完善研发立项文件，规范研发辅助账或专账管理。");
                if ((answers['mgmt_collab'] || 0) < 4) advice.push("建立具体的产学研合作项目，或加强研发设备的购置与管理。");
            }

            // 4. 成长性分析
            if (growthScore >= 16) {
                strengths.push("企业成长性极佳，财务数据亮眼。");
            } else if (growthScore < 10) {
                weaknesses.push("财务增长性较弱，可能拖累总分。");
                advice.push("成长性受限于历史财务数据，短期难以改变。建议在技术创新（IP）和管理水平上争取满分，以弥补财务分的不足。");
            }

            return { summary, strengths, weaknesses, advice };
        };

        // --- Extracted Components ---

        // 1. Intro View
        const IntroView = ({ onStart }) => (
            <div className="flex flex-col items-center text-center space-y-6 max-w-2xl mx-auto p-8 animate-fade-in">
                <div className="bg-primary-light p-4 rounded-full relative">
                    <Award className="w-16 h-16 text-primary" />
                </div>
                <h1 className="text-3xl font-bold text-gray-800">高新技术企业创新能力 <span className="text-primary">自评计算器</span></h1>
                <p className="text-gray-600 text-lg">
                    依据《高新技术企业认定管理工作指引》评价标准，
                    <br/>
                    知识产权、成果转化、管理水平、成长性四维评价。
                </p>
                <div className="grid grid-cols-2 gap-4 w-full text-left">
                    {CATEGORIES.map((cat, idx) => {
                        const IconComp = cat.icon;

        // --- Component: Radar Chart ---
        const RadarChart = ({ scores }) => {
            const size = 300;
            const center = size / 2;
            const radius = 100;
            
            // Normalize scores: Value / Max * Radius
            const axes = [
                { id: 'ip', label: '知识产权', max: 30 },
                { id: 'transformation', label: '成果转化', max: 30 },
                { id: 'management', label: '管理水平', max: 20 },
                { id: 'growth', label: '成长性', max: 20 }
            ];

            const points = axes.map((axis, i) => {
                const angle = (Math.PI * 2 * i) / axes.length - Math.PI / 2; // Start from top
                const value = scores[axis.id] || 0;
                const normalized = (value / axis.max) * radius;
                const x = center + Math.cos(angle) * normalized;
                const y = center + Math.sin(angle) * normalized;
                return { x, y };
            });

            const polyPoints = points.map(p => `${p.x},${p.y}`).join(' ');

            const backgroundPolygons = [0.2, 0.4, 0.6, 0.8, 1].map(scale => {
                const bgPoints = axes.map((_, i) => {
                    const angle = (Math.PI * 2 * i) / axes.length - Math.PI / 2;
                    const r = radius * scale;
                    return `${center + Math.cos(angle) * r},${center + Math.sin(angle) * r}`;
                }).join(' ');
                return bgPoints;
            });

            // 动态颜色逻辑 (SVG Fill)
            const getStatusFill = (current, max) => {
                const ratio = current / max;
                if (ratio >= 0.9) return 'fill-primary'; 
                if (ratio >= 0.7) return 'fill-secondary';
                if (ratio >= 0.5) return 'fill-accent';
                return 'fill-red-500';
            };

            return (
                <div className="flex flex-col items-center">
                    <svg width={size} height={size} className="overflow-visible">
                        {/* Background Grid */}
                        {backgroundPolygons.map((pts, i) => (
                            <polygon key={i} points={pts} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                        ))}
                        
                        {/* Axes Lines */}
                        {axes.map((_, i) => {
                            const angle = (Math.PI * 2 * i) / axes.length - Math.PI / 2;
                            const x = center + Math.cos(angle) * radius;
                            const y = center + Math.sin(angle) * radius;
                            return <line key={i} x1={center} y1={center} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1" />;
                        })}

                        {/* Data Polygon - Using Secondary Color (Blue) for Radar */}
                        <polygon points={polyPoints} fill="rgba(41, 127, 251, 0.2)" stroke="#297FFB" strokeWidth="2" />
                        {points.map((p, i) => {
                            // Points color matches the score status color for extra detail, or keep uniform blue
                            // Let's keep points uniform blue for the shape, but text colored
                            return <circle key={i} cx={p.x} cy={p.y} r="4" fill="#297FFB" stroke="white" strokeWidth="1.5" />
                        })}

                        {/* Labels */}
                        {axes.map((axis, i) => {
                            const angle = (Math.PI * 2 * i) / axes.length - Math.PI / 2;
                            // Push labels out a bit
                            const labelRadius = radius + 35; // Increased spacing
                            const x = center + Math.cos(angle) * labelRadius;
                            const y = center + Math.sin(angle) * labelRadius;
                            
                            const score = scores[axis.id] || 0;
                            const fillClass = getStatusFill(score, axis.max);

                            return (
                                <g key={i}>
                                    {/* 维度名称 - 向上调整 y 坐标 */}
                                    <text 
                                        x={x} 
                                        y={y - 14} 
                                        textAnchor="middle" 
                                        dominantBaseline="middle" 
                                        className="text-xs font-bold fill-gray-500"
                                    >
                                        {axis.label}
                                    </text>
                                    
                                    {/* 分数展示 - 向下调整 y 坐标，增加行间距 */}
                                    <text 
                                        x={x} 
                                        y={y + 10} 
                                        textAnchor="middle" 
                                        dominantBaseline="middle" 
                                    >
                                        <tspan className={`text-lg font-bold ${fillClass}`}>{score}</tspan>
                                        <tspan className="text-xs fill-gray-300" dx="1">/{axis.max}</tspan>
                                    </text>
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        // --- Component: Sidebar Detail Tree ---
        const DetailSidebar = ({ answers, scores }) => {

                    <div className="p-2 custom-scrollbar flex-1 overflow-y-auto">
                        {CATEGORIES.map(cat => {

                                    >
                                        <div className="flex items-center gap-2">
                                            {isOpen ? <ChevronUp className="w-4 h-4 text-gray-400" /> : <ChevronDown className="w-4 h-4 text-gray-400" />}
                                            <span className="font-medium text-gray-700 text-sm">{cat.title.split('、')[1]}</span>
                                        </div>
                                        {/* 修改：大类得分强调 */}
                                        <div className="flex items-baseline">
                                            <span className={`text-base font-bold ${status.text}`}>{catScore}</span>
                                            <span className="text-gray-400 text-xs font-normal ml-0.5">/{cat.maxScore}</span>
                                        </div>
                                    </div>

                                    {isOpen && (
                                        <div className="pl-9 pr-3 pb-3 space-y-3 animate-fade-in">
                                            {cat.questions.map(q => {
                                                const qScore = answers[q.id] || 0;
                                                const pct = (qScore / q.maxScore) * 100;
                                                const qStatus = getStatusColor(qScore, q.maxScore);
                                                
                                                return (
                                                    <div key={q.id} className="text-sm">
                                                        <div className="flex justify-between mb-1.5 items-center">
                                                            <span className="text-gray-600 truncate mr-2 text-xs" title={q.text}>{q.text}</span>
                                                            {/* 修改：小项得分强调，总分弱化 */}

                                                        </div>
                                                        <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                                                            <div 
                                                                className={`h-full rounded-full ${qStatus.bg} transition-all duration-500`} 
                                                                style={{ width: `${pct}%` }}
                                                            ></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // --- Main Component ---

        function HighTechAssessment() {
            const [currentStep, setCurrentStep] = useState(0); 
            const [answers, setAnswers] = useState({});
            // New State: selections (tracks explicit index of chosen option per question)
            const [selections, setSelections] = useState({});
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);

            // Added scrollTo effect
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentStep]);

            const handleSelectOption = (questionId, option, index) => {
                setAnswers(prev => ({ ...prev, [questionId]: option.maxScore }));
                setSelections(prev => ({ ...prev, [questionId]: index }));
            };

            const handleScoreChange = (questionId, newScore) => {
                setAnswers(prev => ({ ...prev, [questionId]: newScore }));
            };

            const calculateCategoryScore = (categoryId) => {
                const category = CATEGORIES.find(c => c.id === categoryId);
                if (!category) return 0;
                let score = 0;
                category.questions.forEach(q => {
                    score += answers[q.id] || 0;
                });
                return Math.min(score, category.maxScore);
            };

            const handleNext = () => {
                if (currentStep < 4) {
                    setCurrentStep(prev => prev + 1);
                } else {
                    setIsAnalyzing(true);
                    setCurrentStep(5);
                    
                    const scores = {};
                    CATEGORIES.forEach(cat => {
                        scores[cat.id] = calculateCategoryScore(cat.id);
                    });

                    // Use Local Analysis Logic
                    setTimeout(() => {
                        const result = generateAnalysis(scores, answers);
                        setAnalysisResult({ scores, ...result });
                        setIsAnalyzing(false);
                    }, 800); // Small fake delay for UX
                }
            };

            const handleBack = () => {
                if (currentStep > 0) setCurrentStep(prev => prev - 1);
            };

            const reset = () => {
                setAnswers({});
                setSelections({});
                setCurrentStep(0);
                setAnalysisResult(null);
            };

            // Color Helper for Result View
            const getColor = (score) => {
                if (score >= 80) return 'text-primary';
                if (score >= 71) return 'text-accent';
                return 'text-red-600';
            };

            // Calculate scores for Result View
            const currentScores = useMemo(() => {
                const scores = {};
                CATEGORIES.forEach(cat => {
                    scores[cat.id] = calculateCategoryScore(cat.id);
                });
                return scores;
            }, [answers]);

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-900">
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 font-bold text-xl text-primary">
                                <Award className="w-6 h-6" />
                                <span>知口袋财税</span>
                            </div>
                            {currentStep > 0 && currentStep < 5 && (
                                <div className="flex items-center gap-2 text-sm text-gray-500">
                                    进度：{currentStep} / 4
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {currentStep === 0 && <IntroView onStart={() => setCurrentStep(1)} />}
                        
                        {currentStep > 0 && currentStep <= 4 && (
                            <QuestionView 
                                step={currentStep}
                                answers={answers}
                                selections={selections}
                                onSelect={handleSelectOption}
                                onChange={handleScoreChange}
                                onNext={handleNext}
                                onBack={handleBack}
                                calculateScore={calculateCategoryScore}
                            />
                        )}

                        {currentStep === 5 && (
                            <ResultView 
                                isAnalyzing={isAnalyzing}
                                result={analysisResult}
                                answers={answers}
                                scores={currentScores} // Pass computed scores
                                onReset={reset}
                                getColor={getColor}
                            />
                        )}
                    </main>

                    <footer className="text-center text-gray-400 text-sm py-8 pb-12">
                        <p>本系统仅供自评参考，依据：《高新技术企业认定管理工作指引》</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HighTechAssessment />);
    </script>
</body>
</html>
