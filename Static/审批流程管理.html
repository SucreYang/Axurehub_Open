    <script>
        // 自定义你的主题色 #00935C
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00935C', // 你的主题色
                        primaryLight: '#E6F4EE', // 对应浅色背景
                        bgCanvas: '#F3F4F6', // 画布灰色背景

                }
            }

    <style>
        /* 自定义滚动条样式，让界面更精致 */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 中间画布节点 hover 动画 */
        .node-container { transition: all 0.2s ease-in-out; }
        .editable-node:hover .node-container { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 147, 92, 0.1); border-color: #00935C; }
        .editable-node:active .node-container { transform: translateY(0); box-shadow: 0 4px 6px -1px rgba(0, 147, 92, 0.1); }

        /* 画布连线中间的 + 号动画 */
        .add-node-btn { transition: all 0.2s; }
        .add-node-btn:hover { transform: scale(1.1) rotate(90deg); background-color: #E6F4EE; color: #00935C; border-color: #00935C; }

        /* 右侧滑出面板动画控制类 */
        .drawer-mask { transition: opacity 0.3s ease; }
        .drawer-panel { transition: transform 0.3s ease; }
        
        /* 内部 Radio 卡片选中样式 */
        .selector-card-active { border-color: #00935C; background-color: #E6F4EE; color: #00935C; font-weight: 500;}
        .approve-type-active { border-color: #00935C; background-color: #E6F4EE; }
        
        /* 简单的 Toast 提示动画 */
        @keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        .toast-show { animation: toastIn 0.3s ease-out forwards; display: block; }
    </style>
</head>

        const panel = document.getElementById('drawer-panel');
        const drawerNodeNameTitle = document.getElementById('drawer-node-name');
        const editableNodes = document.querySelectorAll('.editable-node'); // 中间画布可点选节点
        const closeBtn = document.getElementById('close-drawer-btn');
        const cancelBtn = document.getElementById('cancel-drawer-btn');
        const saveBtn = document.getElementById('save-drawer-btn');
        const toast = document.getElementById('toast');

        // --- 核心逻辑 1 & 2: 抽屉显示控制 (通过点击中间节点触发) ---

        // 打开抽屉
        function showDrawer(nodeTitle) {
            // 更新抽屉标题
            drawerNodeNameTitle.innerText = nodeTitle;
            
            // 显示遮罩层
            mask.classList.remove('hidden');
            setTimeout(() => { mask.classList.remove('opacity-0'); mask.classList.add('opacity-100'); }, 10);
            
            // 滑出面板
            panel.classList.remove('translate-x-full');
            panel.classList.add('translate-x-0');
        }

        // 收起抽屉
        function hideDrawer() {
            // 隐藏遮罩层
            mask.classList.remove('opacity-100'); mask.classList.add('opacity-0');
            setTimeout(() => { mask.classList.add('hidden'); }, 300); // 确保动画结束后隐藏
            
            // 滑回面板
            panel.classList.remove('translate-x-0');
            panel.classList.add('translate-x-full');
            
            // 取消画布中所有节点的高亮状态
            removeActiveStateFromCanvasNodes();
        }

        // 移除画布节点的主色高亮边框
        function removeActiveStateFromCanvasNodes() {
            editableNodes.forEach(node => {
                node.querySelector('.node-container').classList.remove('border-primary', 'shadow-lg', 'shadow-primary/10');
            });
        }

        // 绑定画布上可编辑节点的点击事件
        editableNodes.forEach(node => {
            node.addEventListener('click', () => {
                // 先清除其他节点状态
                removeActiveStateFromCanvasNodes();
                // 为当前被点击节点添加高亮，使用 `#00935C`
                node.querySelector('.node-container').classList.add('border-primary', 'shadow-lg', 'shadow-primary/10');
                
                // 获取节点的具体名称并在抽屉展示
                const nodeTitle = node.getAttribute('data-title') || '属性配置';
                showDrawer(nodeTitle);
            });
        });

        // 绑定关闭、取消按钮、遮罩层点击事件以关闭抽屉
        closeBtn.addEventListener('click', hideDrawer);
        cancelBtn.addEventListener('click', hideDrawer);
        mask.addEventListener('click', hideDrawer); // 点击透明遮罩区域也关闭


        // --- 核心逻辑 3 & 4: 抽屉内部单选交互 & 保存模拟 ---

        // 交互点 3: 内部“审批对象”选择卡片逻辑
        const cards = document.querySelectorAll('.selector-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                // 1. 移除该组下所有卡片的激活状态
                cards.forEach(c => {
                    c.classList.remove('selector-card-active', 'border-primary', 'shadow-sm', 'bg-primaryLight');
                    c.classList.add('border-gray-200', 'text-gray-700');
                    c.querySelector('.check-icon').classList.add('hidden'); // 隐藏对勾
                });
                // 2. 为当前被点击卡片添加激活状态，使用 `#00935C`
                card.classList.remove('border-gray-200', 'text-gray-700');
                card.classList.add('selector-card-active', 'border-primary', 'shadow-sm', 'bg-primaryLight');
                card.querySelector('.check-icon').classList.remove('hidden'); // 显示对勾
            });
        });

        // 交互点 4: 内部“多人审批方式”逻辑模拟 (Radio)
        const radioLabels = document.querySelectorAll('.approve-type-label');
        radioLabels.forEach(label => {
            label.addEventListener('click', () => {
                // 1. 移除同组激活状态
                radioLabels.forEach(l => {
                    l.classList.remove('approve-type-active', 'border-primary', 'bg-primaryLight/30');
                    l.classList.add('border-gray-200');
                });
                // 2. 为当前高亮，使用你的主题浅绿色 `#E6F4EE`
                label.classList.add('approve-type-active', 'border-primary', 'bg-primaryLight/30');
                label.classList.remove('border-gray-200');
            });
        });

        // 交互点 5: 保存操作模拟
        saveBtn.addEventListener('click', () => {
            // 弹出简单 Toast 提示
            toast.classList.remove('hidden');
            toast.classList.add('toast-show');
            
            // 2.5秒后自动关闭
            setTimeout(() => {
                toast.classList.remove('toast-show');
                toast.classList.add('hidden');
                // 保存后滑出抽屉
                hideDrawer();
            }, 2000);
        });

    </script>
</body>
</html>
